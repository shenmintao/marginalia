name: Release

# Triggers on tags matching v*.*.* (e.g. v0.1.0). What it produces:
#   - Tauri desktop bundles for Windows / macOS / Linux, attached to a
#     GitHub Release.
#   - A multi-arch Docker image pushed to ghcr.io/<owner>/marginalia
#     tagged with the version and `latest`.
#
# Tag-driven releases keep the version in tauri.conf.json + pyproject.toml
# in lockstep with the binary names. To cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
#
# A `workflow_dispatch` is also wired so we can re-run a release without
# moving a tag if a runner had a transient failure.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write   # create release, upload assets
  packages: write   # push to ghcr.io

jobs:
  # ---- 1. Tauri desktop bundles ----------------------------------------------
  desktop:
    name: Tauri (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            runner: windows-latest
            artifact_glob: |
              desktop/src-tauri/target/release/bundle/msi/*.msi
              desktop/src-tauri/target/release/bundle/nsis/*.exe
          - target: macos
            runner: macos-latest
            artifact_glob: |
              desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - target: linux
            runner: ubuntu-latest
            artifact_glob: |
              desktop/src-tauri/target/release/bundle/deb/*.deb
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/rpm/*.rpm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Linux Tauri deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      # tauri-action drives `tauri build`, picks the right bundle targets
      # for the host OS, and uploads artifacts to a draft release. We let
      # it create / amend the draft so all three matrix legs converge on
      # one Release page.
      - name: Build & upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Marginalia ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Desktop bundles built from `${{ github.event.inputs.tag || github.ref_name }}`.
            Docker image: `ghcr.io/${{ github.repository_owner }}/marginalia:${{ github.event.inputs.tag || github.ref_name }}`
          releaseDraft: true
          prerelease: false

  # ---- 2. Docker image to ghcr.io --------------------------------------------
  docker:
    name: Docker image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/marginalia
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      # Override the in-Dockerfile mainland-China mirrors with upstream
      # Debian / PyPI for public release builds. The Dockerfile keeps the
      # Tsinghua defaults so local `docker build` from a CN dev machine
      # stays fast.
      # arm64 is intentionally omitted — py7zz publishes wheels only for
      # x86_64 / win_amd64 / macOS universal2, so `pip install py7zz` fails
      # under linux/arm64. Re-add once a fork wheel for aarch64 is available.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APT_MIRROR=
            PIP_INDEX_URL=https://pypi.org/simple
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- 3. Promote draft release to published ---------------------------------
  publish-release:
    name: Publish GitHub Release
    needs: [desktop, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # tauri-action created a draft; flip it to published once Docker is
      # also available, so users never see a release whose Docker tag
      # 404s.
      - name: Publish draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          release_id=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq .id)
          gh api -X PATCH "repos/${{ github.repository }}/releases/$release_id" -f draft=false
