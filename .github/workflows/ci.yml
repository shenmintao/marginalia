name: CI

# What this runs on every push and PR:
#   1. backend-tests  — pytest on the full tests/ tree, three OSes
#   2. frontend-build — desktop/ TypeScript typecheck + Vite build
#   3. tauri-check    — cargo check on the Rust shell (no bundling)
#
# The release pipeline (release.yml) does the heavy bundling on tag pushes;
# CI only proves the code compiles and tests pass.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when new commits land on the same ref. Saves CI
# minutes on rapid pushes; the latest commit is what matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: pytest (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps (locked)
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v

  frontend-build:
    name: desktop tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  tauri-check:
    name: cargo check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Tauri's webkit dep on Linux needs system libraries; Windows / macOS
      # ship them with the SDK. Keep this in lockstep with what release.yml
      # installs for `tauri build`.
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: cargo check --all-targets
